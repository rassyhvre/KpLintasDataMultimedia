<script>
        // OTP Input Navigation logic
        const inputs = document.querySelectorAll('#otp-inputs input');
        
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.inputType === 'deleteContentBackward') return;
                if (input.value && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !input.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
            
            // Allow only numbers
            input.addEventListener('keypress', (e) => {
                if (!/[0-9]/.test(e.key)) {
                    e.preventDefault();
                }
            });
        });

        // Simple Countdown Timer for Resend
        let timeLeft = 59;
        const timerDisplay = document.getElementById('timer');
        const resendBtn = document.getElementById('resend-btn');

        const countdown = setInterval(() => {
            if (timeLeft <= 0) {
                clearInterval(countdown);
                timerDisplay.innerText = '';
                resendBtn.disabled = false;
            } else {
                timeLeft--;
                const seconds = timeLeft < 10 ? `0${timeLeft}` : timeLeft;
                timerDisplay.innerText = `(00:${seconds})`;
                resendBtn.disabled = true;
            }
        }, 1000);

        // Form Submit Simulation
        document.getElementById('otp-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const code = Array.from(inputs).map(i => i.value).join('');
            if (code.length === 6) {
                const btn = e.target.querySelector('button[type="submit"]');
                const originalText = btn.innerHTML;
                btn.disabled = true;
                btn.innerHTML = `<span class="animate-spin material-symbols-outlined">progress_activity</span> Memproses...`;
                
                setTimeout(() => {
                    alert('Verifikasi berhasil!');
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                }, 1500);
            } else {
                alert('Silakan lengkapi 6 digit kode.');
            }
        });
    </script>
